<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>MedAI | Digital Health Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
      :root {
        --primary: #0f766e;
        --accent: #2dd4bf;
        --bg: #f8fafc;
        --text: #1e293b;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: 'Inter', sans-serif;
        background-color: var(--bg);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        overflow: hidden;
      }

      body::before {
        content: "";
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: radial-gradient(circle at 10% 20%, rgba(45, 212, 191, 0.15) 0%, transparent 50%),
                    radial-gradient(circle at 90% 80%, rgba(15, 118, 110, 0.15) 0%, transparent 50%);
        z-index: -1;
      }

      .card {
        background: white;
        padding: 3rem;
        border-radius: 24px;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        max-width: 500px;
        width: 90%;
        text-align: center;
        border: 1px solid rgba(15, 118, 110, 0.1);
      }

      .logo {
        font-weight: 600;
        font-size: 0.8rem;
        color: var(--primary);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 1.5rem;
        display: inline-block;
        background: rgba(45, 212, 191, 0.1);
        padding: 6px 16px;
        border-radius: 50px;
      }

      h1 {
        font-size: 2.5rem;
        font-weight: 600;
        margin: 0 0 1rem;
        color: var(--text);
        line-height: 1.2;
      }

      p {
        font-size: 1.1rem;
        color: #64748b;
        margin-bottom: 2.5rem;
        line-height: 1.5;
      }

      /* This is the container where the button will load */
      #vapi-button-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 80px;
      }

      .status-footer {
        margin-top: 2rem;
        font-size: 0.8rem;
        color: #94a3b8;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }

      .dot {
        height: 8px;
        width: 8px;
        background-color: #22c55e;
        border-radius: 50%;
      }
    </style>

    <script
      src="https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js"
      defer
      async
    ></script>
  </head>
  <body>
    
    <div class="card">
      <div class="logo">Medical AI Voice Bot</div>
      <h1>How can I <span>help you</span> today?</h1>
      <p>Click below to speak with our AI assistant for elderly care and appointment booking.</p>

      <div id="vapi-button-container"></div>

      <div class="status-footer">
        <div class="dot"></div> Server: Active | Language: Hinglish
      </div>
    </div>

    <script>
      window.addEventListener('load', () => {
        window.vapiSDK.run({
          apiKey: '34f70128-12eb-46fe-b880-dde1a388fdc2',
          assistant: '4ffb54f9-fe5d-46c4-996a-36a2536d0541',
          config: {
            // We set it to bottom-center but the CSS 'card' layout 
            // makes it the focal point of the page.
            position: 'bottom', 
            offset: '150px' // Adjusted to sit inside the card visually
          }
        });
      });
    </script>
  </body>
</html>
