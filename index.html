<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>MedAI | Your Digital Health Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
      :root {
        --primary: #0f766e; /* Deep Teal */
        --accent: #2dd4bf;  /* Mint Green */
        --bg: #f8fafc;      /* Soft Grey/White */
        --text: #1e293b;    /* Dark Slate */
      }

      body {
        margin: 0;
        padding: 0;
        font-family: 'Inter', sans-serif;
        background-color: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        text-align: center;
      }

      /* Background Decoration */
      body::before {
        content: "";
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: radial-gradient(circle at 10% 20%, rgba(45, 212, 191, 0.1) 0%, transparent 50%),
                    radial-gradient(circle at 90% 80%, rgba(15, 118, 110, 0.1) 0%, transparent 50%);
        z-index: -1;
      }

      .container {
        max-width: 600px;
        padding: 2rem;
      }

      .logo {
        font-weight: 600;
        font-size: 1.2rem;
        color: var(--primary);
        letter-spacing: 1px;
        text-transform: uppercase;
        margin-bottom: 1rem;
        display: inline-block;
        border: 2px solid var(--primary);
        padding: 4px 12px;
        border-radius: 8px;
      }

      h1 {
        font-size: 3rem;
        font-weight: 600;
        margin: 0;
        color: var(--text);
        line-height: 1.1;
      }

      h1 span {
        color: var(--primary);
      }

      p {
        font-size: 1.1rem;
        color: #64748b;
        margin: 1.5rem 0 2rem;
        line-height: 1.6;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: #ffffff;
        padding: 8px 16px;
        border-radius: 50px;
        box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        font-size: 0.9rem;
        font-weight: 500;
      }

      .dot {
        height: 10px;
        width: 10px;
        background-color: #22c55e;
        border-radius: 50%;
        display: inline-block;
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
        70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
        100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
      }

      /* Instruction for the user */
      .instruction {
        margin-top: 3rem;
        font-size: 0.85rem;
        color: #94a3b8;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
    </style>

    <script
      src="https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js"
      defer
      async
    ></script>
  </head>
  <body>
    
    <div class="container">
      <div class="logo">MedAI v2.4</div>
      <h1>Next-Gen <span>Elderly Care</span> is here.</h1>
      <p>
        Experience our AI-powered medical assistant. Designed to help elderly patients 
        find the right specialist and manage appointments with just a simple conversation.
      </p>

      <div class="status">
        <span class="dot"></span> AI Assistant Online
      </div>

      <div class="instruction">
        Click the button in the bottom right to start talking
      </div>
    </div>

    <script>
      window.addEventListener('load', () => {
        window.vapiSDK.run({
          apiKey: '34f70128-12eb-46fe-b880-dde1a388fdc2',
          assistant: '4ffb54f9-fe5d-46c4-996a-36a2536d0541',
          config: {
            position: 'bottom-right'
          }
        });
      });
    </script>
  </body>
</html>
