<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>MedAI | Your Digital Health Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
      :root {
        --primary: #0f766e;
        --accent: #2dd4bf;
        --bg: #f8fafc;
        --text: #1e293b;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: 'Inter', sans-serif;
        background-color: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        text-align: center;
        overflow: hidden;
      }

      body::before {
        content: "";
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: radial-gradient(circle at 10% 20%, rgba(45, 212, 191, 0.1) 0%, transparent 50%),
                    radial-gradient(circle at 90% 80%, rgba(15, 118, 110, 0.1) 0%, transparent 50%);
        z-index: -1;
      }

      .container {
        max-width: 600px;
        padding: 2rem;
        margin-bottom: 80px; /* Space for the centered button */
      }

      .logo {
        font-weight: 600;
        font-size: 1rem;
        color: var(--primary);
        letter-spacing: 1px;
        text-transform: uppercase;
        margin-bottom: 1.5rem;
        display: inline-block;
        border: 2px solid var(--primary);
        padding: 4px 12px;
        border-radius: 8px;
      }

      h1 {
        font-size: 3.5rem;
        font-weight: 600;
        margin: 0;
        color: var(--text);
        line-height: 1.1;
      }

      h1 span {
        color: var(--primary);
      }

      p {
        font-size: 1.2rem;
        color: #64748b;
        margin: 1.5rem 0 2.5rem;
        line-height: 1.6;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: #ffffff;
        padding: 10px 20px;
        border-radius: 50px;
        box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        font-size: 0.9rem;
        font-weight: 500;
      }

      .dot {
        height: 10px;
        width: 10px;
        background-color: #22c55e;
        border-radius: 50%;
        display: inline-block;
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
        70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
        100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
      }

      /* Customizing the Vapi Button positioning via CSS overrides if needed */
      #vapi-support-btn {
        bottom: 40px !important;
      }
    </style>

    <script
      src="https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js"
      defer
      async
    ></script>
  </head>
  <body>
    
    <div class="container">
      <div class="logo">MedAI Dashboard</div>
      <h1>Speak to your <span>Health Buddy</span>.</h1>
      <p>
        AI-powered medical guidance for the elderly. 
        Ask symptoms, find specialists, and book slots instantly.
      </p>

      <div class="status">
        <span class="dot"></span> Systems Active & Live
      </div>
    </div>

    <script>
      window.addEventListener('load', () => {
        window.vapiSDK.run({
          apiKey: '34f70128-12eb-46fe-b880-dde1a388fdc2',
          assistant: '4ffb54f9-fe5d-46c4-996a-36a2536d0541',
          config: {
            position: 'bottom', // This moves it to the center-bottom
            offset: '40px'      // Distance from the bottom edge
          }
        });
      });
    </script>
  </body>
</html>
